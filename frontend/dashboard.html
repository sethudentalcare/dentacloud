<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentaCloud - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🦷 DentaCloud</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
                <a href="patient-search.html" class="nav-link">Patients</a>
                <a href="patient-form.html" class="nav-link">New Patient</a>
                <a href="billing.html" class="nav-link">Billing</a>
                <a href="#" class="nav-link logout" onclick="handleLogout()">Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Dashboard</h1>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%232196F3'/%3E%3Ctext x='20' y='28' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3E👤%3C/text%3E%3C/svg%3E" alt="Avatar">
                </div>
            </header>

            <div class="dashboard-content">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Patients</h3>
                        <p class="stat-value" id="totalPatients">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Today's Revenue</h3>
                        <p class="stat-value" id="todayRevenue">₹0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Outstanding Amount</h3>
                        <p class="stat-value" id="outstandingAmount">₹0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Appointments Today</h3>
                        <p class="stat-value" id="appointmentsToday">0</p>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions" style="margin-bottom: 30px;">
                    <h2>Quick Actions</h2>
                    <div class="action-buttons" style="display: flex; gap: 10px; margin-top: 15px;">
                        <a href="patient-form.html" class="btn btn-primary">➕ New Patient</a>
                        <a href="patient-search.html" class="btn btn-secondary">🔍 Search Patient</a>
                        <a href="billing.html" class="btn btn-secondary">💰 Generate Invoice</a>
                    </div>
                </div>

                <!-- Recent Patients -->
                <div class="recent-section">
                    <h2>Recent Patients</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Patient ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Last Visit</th>
                            </tr>
                        </thead>
                        <tbody id="recentPatientsTable">
                            <tr>
                                <td colspan="4" style="text-align: center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
